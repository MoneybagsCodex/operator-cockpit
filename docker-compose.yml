services:
  cockpit:
    build: .
    ports:
      - "3000:3000"
    volumes:
      # Shared state: host ~/.operator-state/ mounted into container as /state
      # Claude Code hooks and agent processes write here; container reads the same files
      - "${HOME}/.operator-state:/state"
    environment:
      - NODE_ENV=production
      - OPERATOR_STATE_DIR=/state
    restart: unless-stopped
